name: Send Flash to Site
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 手動でも電撃を送れるようにする

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Site Build
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
          https://api.github.com/repos/kons10/silver-forest-lyrics-wiki/dispatches \
          -d '{"event_type": "lyrics_updated"}'
