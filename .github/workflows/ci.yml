name: Build and Deploy Wiki
on:
  push:
    branches: [ "main" ]
  repository_dispatch:
    types: [lyrics_updated] # 電撃を受け取る設定
  workflow_dispatch:        # ボタンで手動ビルド

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Site
        uses: actions/checkout@v4
        with:
          submodules: true      # サブモジュールも持ってくる
          fetch-depth: 0

      - name: Update Submodules to Latest
        run: |
          git submodule update --remote --recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs and Lantana
        run: |
          pip install lantana
          # 他にプラグイン（git-authors等）を使っていればここに追加してね

      - name: Build and Deploy
        run: |
          mkdocs gh-deploy --force
