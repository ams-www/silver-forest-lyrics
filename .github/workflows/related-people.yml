name: Generate Related People

on:
  workflow_dispatch:

  push:
    paths:
      - persons.txt
      - scripts/generate_related_people.py

permissions:
  contents: write

jobs:
  generate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Generator
        run: |
          python scripts/generate_related_people.py

      - name: Commit
        run: |

          git config user.name "github-actions[bot]"

          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --cached --quiet && exit 0

          git commit \
            -m "auto: update related people"

          git push
